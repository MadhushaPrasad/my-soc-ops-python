<div id="game-container" class="landing-hero">

  <!-- Animated background layers -->
  <div class="landing-bg">
    <div class="landing-orb landing-orb-1"></div>
    <div class="landing-orb landing-orb-2"></div>
    <div class="landing-orb landing-orb-3"></div>
    <div class="landing-grid-overlay"></div>
  </div>

  <!-- Floating bingo numbers decoration -->
  <div class="landing-floats" aria-hidden="true">
    <span class="float-num fn-1">B7</span>
    <span class="float-num fn-2">I23</span>
    <span class="float-num fn-3">N35</span>
    <span class="float-num fn-4">G52</span>
    <span class="float-num fn-5">O68</span>
  </div>

  <!-- Main content -->
  <div class="landing-content">

    <div class="landing-eyebrow">✦ SOCIAL EVENT GAME ✦</div>

    <h1 class="landing-title">
      Soc<em>Ops</em>
    </h1>

    <p class="landing-tagline">Bingo, but make it social</p>

    <!-- How to play -->
    <div class="landing-steps">
      <div class="landing-step">
        <div class="step-number">01</div>
        <p class="step-text">Find people who match the squares on your card</p>
      </div>
      <div class="landing-step">
        <div class="step-number">02</div>
        <p class="step-text">Tap a square whenever you find a match</p>
      </div>
      <div class="landing-step">
        <div class="step-number">03</div>
        <p class="step-text">Complete 5&nbsp;in a row to win!</p>
      </div>
    </div>

    <!-- CTA -->
    <button
        hx-post="/start"
        hx-target="#game-container"
        hx-swap="outerHTML"
        class="landing-cta">
      <span>Start Playing</span>
      <span class="cta-arrow">→</span>
    </button>

    <p class="landing-hint">No sign-up needed &middot; Play instantly</p>

  </div>
</div>
