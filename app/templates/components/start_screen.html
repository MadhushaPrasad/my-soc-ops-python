<style>
    .landing-wrap {
        min-height: 100vh;
        background: #030b18;
        background-image:
            radial-gradient(ellipse 90% 55% at 50% -5%, rgba(6, 182, 212, 0.14) 0%, transparent 68%),
            radial-gradient(ellipse 60% 40% at 80% 100%, rgba(124, 58, 237, 0.1) 0%, transparent 60%);
        font-family: 'Syne', system-ui, sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        padding: 2rem 1.5rem;
        overflow: hidden;
        position: relative;
    }

    /* Subtle grid lines */
    .landing-wrap::before {
        content: '';
        position: absolute;
        inset: 0;
        background-image:
            linear-gradient(rgba(6, 182, 212, 0.05) 1px, transparent 1px),
            linear-gradient(90deg, rgba(6, 182, 212, 0.05) 1px, transparent 1px);
        background-size: 56px 56px;
        pointer-events: none;
    }

    /* Top edge glow line */
    .landing-wrap::after {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0;
        height: 2px;
        background: linear-gradient(90deg, transparent, #06b6d4 40%, #a78bfa 60%, transparent);
    }

    .landing-content {
        position: relative;
        z-index: 1;
        text-align: center;
        max-width: 26rem;
        width: 100%;
    }

    .landing-badge {
        display: inline-flex;
        align-items: center;
        gap: 0.5rem;
        background: rgba(6, 182, 212, 0.1);
        border: 1px solid rgba(6, 182, 212, 0.28);
        border-radius: 100px;
        padding: 0.35rem 1rem;
        font-size: 0.7rem;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: #67e8f9;
        margin-bottom: 1.75rem;
        animation: landingFade 0.55s ease-out both;
    }

    .landing-title {
        font-size: clamp(3.2rem, 14vw, 5.5rem);
        font-weight: 800;
        line-height: 0.92;
        letter-spacing: -0.03em;
        color: #f0f9ff;
        margin-bottom: 0.8rem;
        animation: landingFade 0.55s 0.08s ease-out both;
    }

    .landing-title-accent {
        background: linear-gradient(125deg, #06b6d4 0%, #818cf8 55%, #c084fc 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
    }

    .landing-tagline {
        font-size: 0.95rem;
        color: #64748b;
        margin-bottom: 2.5rem;
        letter-spacing: 0.04em;
        animation: landingFade 0.55s 0.16s ease-out both;
    }

    .landing-steps {
        display: flex;
        flex-direction: column;
        gap: 0.65rem;
        margin-bottom: 2.5rem;
        animation: landingFade 0.55s 0.24s ease-out both;
    }

    .landing-step {
        display: flex;
        align-items: center;
        gap: 0.875rem;
        background: rgba(255, 255, 255, 0.03);
        border: 1px solid rgba(255, 255, 255, 0.07);
        border-radius: 0.875rem;
        padding: 0.875rem 1.1rem;
        text-align: left;
        transition: border-color 0.2s ease, background 0.2s ease;
    }

    .landing-step:hover {
        background: rgba(6, 182, 212, 0.05);
        border-color: rgba(6, 182, 212, 0.18);
    }

    .landing-step-num {
        flex-shrink: 0;
        width: 1.75rem;
        height: 1.75rem;
        border-radius: 50%;
        background: rgba(6, 182, 212, 0.12);
        border: 1px solid rgba(6, 182, 212, 0.3);
        color: #67e8f9;
        font-size: 0.7rem;
        font-weight: 800;
        display: flex;
        align-items: center;
        justify-content: center;
        letter-spacing: 0;
    }

    .landing-step-icon {
        font-size: 1.25rem;
        flex-shrink: 0;
        width: 2.25rem;
        text-align: center;
    }

    .landing-step-text {
        font-size: 0.85rem;
        color: #94a3b8;
        line-height: 1.45;
    }

    .landing-step-text strong {
        display: block;
        color: #e2e8f0;
        font-weight: 700;
        font-size: 0.875rem;
        margin-bottom: 0.1rem;
    }

    .landing-cta {
        width: 100%;
        background: linear-gradient(135deg, #0891b2 0%, #6d28d9 100%);
        color: #fff;
        font-family: 'Syne', system-ui, sans-serif;
        font-weight: 700;
        font-size: 1.05rem;
        letter-spacing: 0.03em;
        padding: 1rem 2rem;
        border-radius: 0.875rem;
        cursor: pointer;
        border: none;
        position: relative;
        overflow: hidden;
        box-shadow: 0 0 36px rgba(6, 182, 212, 0.25), 0 4px 16px rgba(0, 0, 0, 0.4);
        transition: transform 0.14s ease, box-shadow 0.14s ease;
        animation: landingFade 0.55s 0.32s ease-out both;
    }

    .landing-cta::after {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(135deg, rgba(255,255,255,0.13) 0%, transparent 50%);
    }

    .landing-cta:active {
        transform: scale(0.97);
        box-shadow: 0 0 18px rgba(6, 182, 212, 0.18), 0 2px 8px rgba(0, 0, 0, 0.3);
    }

    .landing-deco {
        position: absolute;
        font-family: 'Syne', system-ui, sans-serif;
        font-weight: 800;
        color: #06b6d4;
        pointer-events: none;
        user-select: none;
        opacity: 0.045;
        line-height: 1;
    }

    @keyframes landingFade {
        from { opacity: 0; transform: translateY(-14px); }
        to   { opacity: 1; transform: translateY(0); }
    }
</style>

<div id="game-container">
    <div class="landing-wrap">

        <!-- Decorative BINGO letters -->
        <div class="landing-deco" style="top: 6%; left: 4%; font-size: 5rem;">B</div>
        <div class="landing-deco" style="top: 18%; right: 5%; font-size: 3.5rem;">I</div>
        <div class="landing-deco" style="bottom: 22%; left: 6%; font-size: 6rem;">N</div>
        <div class="landing-deco" style="bottom: 32%; right: 4%; font-size: 4rem;">G</div>
        <div class="landing-deco" style="top: 46%; left: 2%; font-size: 4.5rem;">O</div>

        <div class="landing-content">

            <div class="landing-badge">
                <span>🎯</span>
                <span>Social Icebreaker</span>
            </div>

            <h1 class="landing-title">
                Soc<span class="landing-title-accent">Ops</span>
            </h1>

            <p class="landing-tagline">Connect · Discover · Bingo</p>

            <div class="landing-steps">
                <div class="landing-step">
                    <div class="landing-step-icon">🔍</div>
                    <div class="landing-step-text">
                        <strong>Find your matches</strong>
                        Spot someone around you who fits a square
                    </div>
                </div>
                <div class="landing-step">
                    <div class="landing-step-icon">✅</div>
                    <div class="landing-step-text">
                        <strong>Tap to mark it</strong>
                        Claim each square the moment you find a match
                    </div>
                </div>
                <div class="landing-step">
                    <div class="landing-step-icon">🏆</div>
                    <div class="landing-step-text">
                        <strong>Get five in a row</strong>
                        Fill a line horizontally, vertically, or diagonally to win
                    </div>
                </div>
            </div>

            <button
                hx-post="/start"
                hx-target="#game-container"
                hx-swap="outerHTML"
                class="landing-cta">
                Let's Play →
            </button>

        </div>
    </div>
</div>
